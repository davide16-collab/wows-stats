<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wows Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Saira:wght@400;500;600&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand" id="homeBtn" title="Home">
      <span class="brand-mark"></span>
      <span class="brand-name">WOWS<span class="amber">STATS</span></span>
    </div>
    <form class="search" id="searchForm" autocomplete="off">
      <input type="text" id="searchInput" placeholder="Search a player&hellip;" spellcheck="false" />
      <select id="realmSelect" title="Server">
        <option value="eu">EU</option>
        <option value="na">NA</option>
        <option value="asia">ASIA</option>
      </select>
      <button type="submit" id="searchBtn">SEARCH</button>
    </form>
    <button type="button" id="compareBtn" class="compare-btn">COMPARE</button>
    <a href="/leaderboards.html" class="compare-btn" style="text-decoration:none">RANKINGS</a>
    <select id="langSelect" title="Language" class="lang-select">
      <option value="en">EN</option>
      <option value="it">IT</option>
      <option value="fr">FR</option>
      <option value="de">DE</option>
      <option value="es">ES</option>
    </select>
  </header>

  <main id="main">
    <!-- HERO -->
    <section class="hero" id="hero">
      <h1 id="heroTitle">Statistics <span class="amber">World&nbsp;of&nbsp;Warships</span></h1>
      <p class="hero-sub" id="heroSub">Search a commander by nickname and analyse their rating, win rates and every ship.</p>
      <form class="hero-search" id="heroForm" autocomplete="off">
        <input type="text" id="heroInput" placeholder="e.g. PotatoSquad" spellcheck="false" />
        <button type="submit">SEARCH</button>
      </form>
      <div class="hero-foot" id="heroFoot"></div>
    </section>

    <!-- RISULTATI MULTIPLI -->
    <section class="results hidden" id="results">
      <h2>Results</h2>
      <ul id="resultsList"></ul>
    </section>

    <!-- PROFILO GIOCATORE -->
    <section class="profile hidden" id="profile"></section>

    <!-- CONFRONTO -->
    <section class="compare hidden" id="compare">
      <a class="cmp-back" id="cmpBack" href="javascript:void(0)">&larr; Back to search</a>
      <h2 id="cmpTitle">Compare two players</h2>
      <div class="cmp-inputs">
        <input type="text" id="cmpInputA" placeholder="Player 1" spellcheck="false" />
        <span class="cmp-vs">VS</span>
        <input type="text" id="cmpInputB" placeholder="Player 2" spellcheck="false" />
        <button type="button" id="cmpGo">Compare</button>
      </div>
      <div id="cmpResult"></div>
    </section>

    <!-- STATO -->
    <div class="status hidden" id="status"></div>
  </main>

  <footer class="foot">
    <span id="footText">Wows Stats &mdash; data via the Wargaming Public API.</span>
    <span id="footMeta"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
